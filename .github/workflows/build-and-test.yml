name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
          - macos-15
          - macos-26
        build_type:
          - Debug
          - Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-svg-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade aqtinstall
          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2022_64 `
            --outputdir "$env:RUNNER_WORKSPACE\Qt" `
            --modules qtsvg qttools
          $qtRoot = Get-ChildItem -Path "$env:RUNNER_WORKSPACE\Qt\6.7.3" -Directory |
            Where-Object { $_.Name -like "*msvc2022_64" } |
            Select-Object -First 1
          if (-not $qtRoot) {
            throw "Qt installation root not found."
          }
          "CMAKE_PREFIX_PATH=$($qtRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($qtRoot.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install macOS Qt dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install qtbase qtsvg
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qtbase);$(brew --prefix qtsvg)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qtbase)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DTHERION_ENABLE_STRICT_WARNINGS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run unit tests
        run: >
          ctest --test-dir build
          --build-config ${{ matrix.build_type }}
          -L unit
          --output-on-failure
          --timeout 300

      - name: Run UI smoke tests
        run: >
          cmake -E env QT_QPA_PLATFORM=offscreen
          ctest --test-dir build
          --build-config ${{ matrix.build_type }}
          -L ui
          --output-on-failure
          --timeout 300

  ubuntu-26:
    name: ubuntu-26.04 ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:26.04

    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release

    steps:
      - name: Install Ubuntu 26.04 build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            git \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            python3 \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-svg-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DTHERION_ENABLE_STRICT_WARNINGS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run unit tests
        run: >
          ctest --test-dir build
          --build-config ${{ matrix.build_type }}
          -L unit
          --output-on-failure
          --timeout 300

      - name: Run UI smoke tests
        run: >
          cmake -E env QT_QPA_PLATFORM=offscreen
          ctest --test-dir build
          --build-config ${{ matrix.build_type }}
          -L ui
          --output-on-failure
          --timeout 300
