name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
          - macos-14
        build_type:
          - Debug
          - Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.3
          modules: qtsvg qttools
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DTHERION_ENABLE_STRICT_WARNINGS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run unit tests
        run: >
          ctest --test-dir build
          --build-config ${{ matrix.build_type }}
          -L unit
          --output-on-failure
          --timeout 300

      - name: Run UI smoke tests
        run: >
          cmake -E env QT_QPA_PLATFORM=offscreen
          ctest --test-dir build
          --build-config ${{ matrix.build_type }}
          -L ui
          --output-on-failure
          --timeout 300
