name: Build Linux

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_ui_smoke_tests:
        description: Run UI smoke tests during manual runs
        required: false
        type: boolean
        default: true

jobs:
  ubuntu-24:
    name: ubuntu-24.04 Debug
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check structure constraints
        run: python3 scripts/check_structure_constraints.py

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            ninja-build \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qml6-module-qtqml-workerscript \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qml6-module-qtquick-templates \
            qml6-module-qtquick-window \
            qt6-svg-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools

      - name: Limit build parallelism
        run: echo "CMAKE_BUILD_PARALLEL_LEVEL=4" >> "$GITHUB_ENV"

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DTHERION_ENABLE_STRICT_WARNINGS=ON

      - name: Build app and unit tests
        run: cmake --build build --config Debug --target TherionStudio therion_unit_tests

      - name: Install app to staging prefix
        run: cmake --install build --prefix "$PWD/build/install-smoke"

      - name: Verify install layout
        run: python3 scripts/verify_install_layout.py --platform linux --prefix "$PWD/build/install-smoke"

      - name: Run unit tests
        run: >
          ctest --test-dir build
          --build-config Debug
          -L unit
          --output-on-failure
          --timeout 300

      - name: Build UI smoke tests
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_ui_smoke_tests)
        run: cmake --build build --config Debug --target therion_ui_tests

      - name: Run UI smoke tests
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_ui_smoke_tests)
        run: >
          cmake -E env QT_QPA_PLATFORM=offscreen
          ctest --test-dir build
          --build-config Debug
          -j 2
          -L ui
          --output-on-failure
          --timeout 300
