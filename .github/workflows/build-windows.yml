name: Build Windows

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_ui_smoke_tests:
        description: Run UI smoke tests during manual runs
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: windows-2022 Debug
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MSVC toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vsWhere)) {
            throw "vswhere.exe not found at $vsWhere"
          }

          $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstallPath) {
            throw "No Visual Studio installation with MSVC tools found."
          }
          $vsInstallPath = $vsInstallPath.Trim()

          $vsDevCmd = Join-Path $vsInstallPath "Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat not found at $vsDevCmd"
          }

          $configuredEnv = & cmd.exe /s /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set"
          if ($LASTEXITCODE -ne 0) {
            throw "VsDevCmd.bat failed with exit code $LASTEXITCODE"
          }

          foreach ($line in $configuredEnv) {
            if ($line -match '^([^=]+)=(.*)$') {
              $name = $Matches[1]
              $value = $Matches[2]
              if ($name -match '^(GITHUB_|RUNNER_)') {
                continue
              }
              "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Install Qt
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -Scope Global -ErrorAction SilentlyContinue) {
            $global:PSNativeCommandUseErrorActionPreference = $true
          }
          function Invoke-CheckedNativeCommand {
            $command = $args[0]
            $commandArgs = @($args | Select-Object -Skip 1)
            & $command @commandArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Command failed with exit code ${LASTEXITCODE}: $($args -join ' ')"
            }
          }

          Invoke-CheckedNativeCommand python -m pip install --upgrade aqtinstall
          Invoke-CheckedNativeCommand python -m aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 `
            --base https://download.qt.io `
            --timeout 30 `
            --outputdir "$env:RUNNER_WORKSPACE\Qt" `
            --archives qtbase qtsvg qttools
          $qtRoot = Get-ChildItem -Path "$env:RUNNER_WORKSPACE\Qt\6.8.3" -Directory |
            Where-Object { $_.Name -like "*msvc2022_64" } |
            Select-Object -First 1
          if (-not $qtRoot) {
            throw "Qt installation root not found."
          }
          "CMAKE_PREFIX_PATH=$($qtRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($qtRoot.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DTHERION_ENABLE_STRICT_WARNINGS=ON

      - name: Build
        run: cmake --build build --target TherionStudio therion_unit_tests

      - name: Install app to staging prefix
        shell: pwsh
        run: cmake --install build --prefix "$env:GITHUB_WORKSPACE\build\install-smoke" --config Debug

      - name: Verify install layout
        shell: pwsh
        run: python scripts/verify_install_layout.py --platform windows --prefix "$env:GITHUB_WORKSPACE\build\install-smoke"

      - name: Run unit tests
        run: >
          ctest --test-dir build
          -L unit
          -E StructureConstraintsTest
          --output-on-failure
          --timeout 300
