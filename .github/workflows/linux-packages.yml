name: Linux Packages

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to package
        required: true
        default: main
      build_type:
        description: CMake build type
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo

jobs:
  package:
    name: Build .deb and AppImage
    runs-on: ubuntu-24.04
    env:
      APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
      APPIMAGETOOL_SHA256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0
      APPIMAGE_RUNTIME_URL: https://github.com/AppImage/type2-runtime/releases/download/20251108/runtime-x86_64
      APPIMAGE_RUNTIME_SHA256: 2fca8b443c92510f1483a883f60061ad09b46b978b2631c807cd873a47ec260d
      APPIMAGE_BUILD_IMAGE: debian:13
      APPIMAGE_QT_ARCHITECTURE: amd64
      APPIMAGE_QT_PACKAGES: qt6-base-dev,qt6-base-dev-tools,qt6-svg-dev,qt6-tools-dev,qt6-tools-dev-tools

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Resolve package version
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$(git tag --points-at HEAD | grep -E '^v?[0-9]{4}\.[0-9]{1,2}\.[0-9]+$' | head -n1 || true)"
          if [[ -n "$release_tag" ]]; then
            version="${release_tag#v}"
            package_label="$version"
            debian_version="$version"
            {
              echo "THERION_STUDIO_VERSION=$version"
              echo "THERION_STUDIO_PACKAGE_LABEL=$package_label"
              echo "THERION_STUDIO_DEBIAN_VERSION=$debian_version"
            } >> "$GITHUB_ENV"
            echo "Resolved Therion Studio release version $version from tag $release_tag"
          else
            year="$(date -u +%Y)"
            month="$((10#$(date -u +%m)))"
            snapshot_date="$(date -u +%Y%m%d)"
            short_sha="$(git rev-parse --short HEAD)"
            version="${year}.${month}.0"
            package_label="dev-${short_sha}"
            debian_version="${version}+git${snapshot_date}.g${short_sha}"
            {
              echo "THERION_STUDIO_VERSION=$version"
              echo "THERION_STUDIO_PACKAGE_LABEL=$package_label"
              echo "THERION_STUDIO_DEBIAN_VERSION=$debian_version"
            } >> "$GITHUB_ENV"
            echo "No CalVer release tag points at this commit; using development version $version, package label $package_label, and Debian version $debian_version."
          fi

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            dpkg-dev \
            file \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-svg-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            wget

      - name: Configure .deb build
        run: >
          cmake -S . -B build-linux-packages
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }}
          -DCMAKE_INSTALL_PREFIX=/usr
          -DTHERION_STUDIO_VERSION=${{ env.THERION_STUDIO_VERSION }}
          -DTHERION_STUDIO_PACKAGE_LABEL=${{ env.THERION_STUDIO_PACKAGE_LABEL }}
          -DTHERION_STUDIO_DEBIAN_VERSION=${{ env.THERION_STUDIO_DEBIAN_VERSION }}
          -DTHERION_ENABLE_STRICT_WARNINGS=ON

      - name: Build .deb app
        run: cmake --build build-linux-packages --target TherionStudio --parallel

      - name: Install .deb app to staging prefix
        run: cmake --install build-linux-packages --prefix "$PWD/build-linux-packages/install-smoke"

      - name: Verify install layout
        run: python3 scripts/verify_install_layout.py --platform linux --prefix "$PWD/build-linux-packages/install-smoke"

      - name: Create .deb package
        run: >
          cpack
          --config build-linux-packages/CPackConfig.cmake
          -G DEB
          -B build-linux-packages
          -C ${{ inputs.build_type }}
          --verbose

      - name: Build AppImage in Debian 13 container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -e "APPIMAGETOOL_SHA256=$APPIMAGETOOL_SHA256" \
            -e "APPIMAGETOOL_URL=$APPIMAGETOOL_URL" \
            -e "APPIMAGE_RUNTIME_SHA256=$APPIMAGE_RUNTIME_SHA256" \
            -e "APPIMAGE_RUNTIME_URL=$APPIMAGE_RUNTIME_URL" \
            -e "BUILD_TYPE=${{ inputs.build_type }}" \
            -e "THERION_STUDIO_DEBIAN_VERSION=$THERION_STUDIO_DEBIAN_VERSION" \
            -e "THERION_STUDIO_PACKAGE_LABEL=$THERION_STUDIO_PACKAGE_LABEL" \
            -e "THERION_STUDIO_VERSION=$THERION_STUDIO_VERSION" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$APPIMAGE_BUILD_IMAGE" \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y \
                ca-certificates \
                cmake \
                dpkg-dev \
                file \
                libgl1-mesa-dev \
                libxkbcommon-dev \
                libxkbcommon-x11-0 \
                libxcb-cursor0 \
                libxcb-icccm4 \
                libxcb-image0 \
                libxcb-keysyms1 \
                libxcb-render-util0 \
                libxcb-xinerama0 \
                ninja-build \
                patchelf \
                qt6-base-dev \
                qt6-base-dev-tools \
                qt6-svg-dev \
                qt6-tools-dev \
                qt6-tools-dev-tools \
                wget

              rm -rf build-linux-appimage
              mkdir -p build-linux-appimage
              dpkg-query -W qt6-base-dev | cut -f2 > build-linux-appimage/appimage-qt-version.txt

              cmake -S . -B build-linux-appimage \
                -G Ninja \
                -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DTHERION_STUDIO_VERSION="$THERION_STUDIO_VERSION" \
                -DTHERION_STUDIO_PACKAGE_LABEL="$THERION_STUDIO_PACKAGE_LABEL" \
                -DTHERION_STUDIO_DEBIAN_VERSION="$THERION_STUDIO_DEBIAN_VERSION" \
                -DTHERION_ENABLE_STRICT_WARNINGS=ON \
                -DTHERION_ENABLE_QT_LINUX_DEPLOY_INSTALL=ON
              cmake --build build-linux-appimage --target TherionStudio --parallel

              rm -rf build-linux-appimage/AppDir
              DESTDIR="$PWD/build-linux-appimage/AppDir" cmake --install build-linux-appimage --prefix /usr

              appdir="$PWD/build-linux-appimage/AppDir"
              usr_dir="$appdir/usr"
              desktop_file="$usr_dir/share/applications/therion-studio.desktop"
              icon_file="$usr_dir/share/icons/hicolor/256x256/apps/therion-studio.png"
              test -x "$usr_dir/bin/TherionStudio"
              test -f "$desktop_file"
              test -f "$icon_file"
              cp "$desktop_file" "$appdir/therion-studio.desktop"
              cp "$icon_file" "$appdir/therion-studio.png"
              ln -sf therion-studio.png "$appdir/.DirIcon"
              ln -sf usr/bin/TherionStudio "$appdir/AppRun"

              pushd build-linux-appimage >/dev/null
              wget -q "$APPIMAGETOOL_URL" -O appimagetool.AppImage
              echo "$APPIMAGETOOL_SHA256  appimagetool.AppImage" | sha256sum --check --strict
              wget -q "$APPIMAGE_RUNTIME_URL" -O runtime-x86_64
              echo "$APPIMAGE_RUNTIME_SHA256  runtime-x86_64" | sha256sum --check --strict
              chmod +x appimagetool.AppImage
              ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool.AppImage \
                --runtime-file runtime-x86_64 \
                AppDir \
                "TherionStudio-${THERION_STUDIO_PACKAGE_LABEL}-Linux-x86_64.AppImage"
              popd >/dev/null
            '
          echo "APPIMAGE_QT_VERSION=$(cat build-linux-appimage/appimage-qt-version.txt)" >> "$GITHUB_ENV"

      - name: Verify Linux artifacts and generate manifest
        id: verify_linux_artifacts
        run: |
          python3 scripts/verify_linux_release_artifacts.py \
            --build-dir "$PWD/build-linux-packages" \
            --appimage-dir "$PWD/build-linux-appimage" \
            --expected-package-label "${{ env.THERION_STUDIO_PACKAGE_LABEL }}" \
            --version "${{ env.THERION_STUDIO_VERSION }}" \
            --source-ref "${{ inputs.source_ref }}" \
            --build-type "${{ inputs.build_type }}" \
            --debian-version "${{ env.THERION_STUDIO_DEBIAN_VERSION }}" \
            --appimagetool-url "$APPIMAGETOOL_URL" \
            --appimagetool-sha256 "$APPIMAGETOOL_SHA256" \
            --appimage-runtime-url "$APPIMAGE_RUNTIME_URL" \
            --appimage-runtime-sha256 "$APPIMAGE_RUNTIME_SHA256" \
            --appimage-qt-source "$APPIMAGE_BUILD_IMAGE apt" \
            --appimage-qt-version "$APPIMAGE_QT_VERSION" \
            --appimage-qt-architecture "$APPIMAGE_QT_ARCHITECTURE" \
            --appimage-qt-packages "$APPIMAGE_QT_PACKAGES" \
            --manifest-out "$PWD/build-linux-packages/TherionStudio-Linux-artifacts-manifest.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TherionStudio-Linux-packages
          path: |
            ${{ steps.verify_linux_artifacts.outputs.deb_path }}
            ${{ steps.verify_linux_artifacts.outputs.appimage_path }}
            ${{ steps.verify_linux_artifacts.outputs.manifest_path }}
          if-no-files-found: error

  smoke-linux-targets:
    name: Smoke test Linux artifacts on ${{ matrix.target_name }}
    needs: package
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Ubuntu 26.04
            container_image: ubuntu:26.04
            deb_smoke: true
          - target_name: Debian 13
            container_image: debian:13
            deb_smoke: false
    container:
      image: ${{ matrix.container_image }}

    steps:
      - name: Install smoke-test dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            coreutils \
            file

      - name: Download Linux package artifacts
        uses: actions/download-artifact@v5
        with:
          name: TherionStudio-Linux-packages
          path: /tmp/therion-linux-packages

      - name: Install .deb package
        if: ${{ matrix.deb_smoke }}
        shell: bash
        run: |
          set -euo pipefail
          deb_path="$(find /tmp/therion-linux-packages -type f -name '*.deb' | sort | head -n1)"
          if [[ -z "$deb_path" ]]; then
            echo "No .deb artifact found in /tmp/therion-linux-packages"
            find /tmp/therion-linux-packages -maxdepth 3 -print | sort || true
            exit 1
          fi
          apt-get install -y "$deb_path"

      - name: Verify installed paths
        if: ${{ matrix.deb_smoke }}
        run: |
          test -x /usr/bin/TherionStudio
          test -f /usr/share/applications/therion-studio.desktop
          test -f /usr/share/icons/hicolor/256x256/apps/therion-studio.png
          test -f /usr/share/metainfo/therion-studio.metainfo.xml

      - name: Launch .deb smoke test (offscreen)
        if: ${{ matrix.deb_smoke }}
        shell: bash
        run: |
          set -euo pipefail
          set +e
          QT_QPA_PLATFORM=offscreen timeout 10s /usr/bin/TherionStudio -platform offscreen >/tmp/therion-studio-launch.log 2>&1
          exit_code=$?
          set -e
          if [[ "$exit_code" -ne 0 && "$exit_code" -ne 124 ]]; then
            echo "TherionStudio launch failed with exit code $exit_code"
            cat /tmp/therion-studio-launch.log
            exit "$exit_code"
          fi
          if [[ "$exit_code" -eq 124 ]]; then
            echo "TherionStudio started successfully (terminated by timeout as expected)."
          fi

      - name: Launch AppImage smoke test (offscreen)
        shell: bash
        run: |
          set -euo pipefail
          appimage_path="$(find /tmp/therion-linux-packages -type f -name '*.AppImage' | sort | head -n1)"
          if [[ -z "$appimage_path" ]]; then
            echo "No AppImage artifact found in /tmp/therion-linux-packages"
            find /tmp/therion-linux-packages -maxdepth 3 -print | sort || true
            exit 1
          fi
          chmod +x "$appimage_path"

          set +e
          QT_QPA_PLATFORM=offscreen APPIMAGE_EXTRACT_AND_RUN=1 timeout 12s \
            "$appimage_path" -platform offscreen >/tmp/therion-studio-appimage-launch.log 2>&1
          exit_code=$?
          set -e
          if [[ "$exit_code" -ne 0 && "$exit_code" -ne 124 ]]; then
            echo "AppImage launch failed with exit code $exit_code"
            cat /tmp/therion-studio-appimage-launch.log
            exit "$exit_code"
          fi
          if [[ "$exit_code" -eq 124 ]]; then
            echo "AppImage started successfully (terminated by timeout as expected)."
          fi
