name: Linux Packages

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to package
        required: true
        default: main
      build_type:
        description: CMake build type
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo

jobs:
  package:
    name: Build .deb and AppImage (${{ matrix.appimage_architecture }})
    runs-on: ${{ matrix.runner_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - appimage_architecture: x86_64
            appimagetool_sha256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0
            appimagetool_url: https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
            appimage_runtime_sha256: 2fca8b443c92510f1483a883f60061ad09b46b978b2631c807cd873a47ec260d
            appimage_runtime_url: https://github.com/AppImage/type2-runtime/releases/download/20251108/runtime-x86_64
            deb_qt_architecture: amd64
            docker_platform: linux/amd64
            runner_label: ubuntu-24.04
          - appimage_architecture: aarch64
            appimagetool_sha256: f0837e7448a0c1e4e650a93bb3e85802546e60654ef287576f46c71c126a9158
            appimagetool_url: https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-aarch64.AppImage
            appimage_runtime_sha256: 00cbdfcf917cc6c0ff6d3347d59e0ca1f7f45a6df1a428a0d6d8a78664d87444
            appimage_runtime_url: https://github.com/AppImage/type2-runtime/releases/download/20251108/runtime-aarch64
            deb_qt_architecture: arm64
            docker_platform: linux/arm64
            runner_label: ubuntu-24.04-arm
    env:
      APPIMAGE_BUILD_IMAGE: debian:13
      APPIMAGE_QT_PACKAGES: qt6-base-dev,qt6-base-dev-tools,qt6-declarative-dev,qml6-module-qtqml-workerscript,qml6-module-qtquick-controls,qml6-module-qtquick-layouts,qml6-module-qtquick-templates,qt6-qpa-plugins,qt6-svg-dev,qt6-tools-dev,qt6-tools-dev-tools
      DEB_BUILD_IMAGE: ubuntu:26.04
      DEB_PLATFORM_LABEL: ubuntu-26.04
      DEB_QT_PACKAGES: qt6-base-dev,qt6-base-dev-tools,qt6-declarative-dev,qml6-module-qtqml-workerscript,qml6-module-qtquick-controls,qml6-module-qtquick-layouts,qml6-module-qtquick-templates,qt6-qpa-plugins,qt6-svg-dev,qt6-tools-dev,qt6-tools-dev-tools
      PACKAGE_BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
      PACKAGE_SOURCE_REF: ${{ inputs.source_ref || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.PACKAGE_SOURCE_REF }}
          fetch-depth: 0

      - name: Resolve package version
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$(git tag --points-at HEAD | grep -E '^v?[0-9]{4}\.[0-9]{1,2}\.[0-9]+$' | head -n1 || true)"
          if [[ -n "$release_tag" ]]; then
            version="${release_tag#v}"
            package_label="$version"
            debian_version="$version"
            {
              echo "THERION_STUDIO_VERSION=$version"
              echo "THERION_STUDIO_PACKAGE_LABEL=$package_label"
              echo "THERION_STUDIO_DEBIAN_VERSION=$debian_version"
            } >> "$GITHUB_ENV"
            echo "Resolved Therion Studio release version $version from tag $release_tag"
          else
            year="$(date -u +%Y)"
            month="$((10#$(date -u +%m)))"
            snapshot_date="$(date -u +%Y%m%d)"
            short_sha="$(git rev-parse --short HEAD)"
            version="${year}.${month}.0"
            package_label="dev-${short_sha}"
            debian_version="${version}+git${snapshot_date}.g${short_sha}"
            {
              echo "THERION_STUDIO_VERSION=$version"
              echo "THERION_STUDIO_PACKAGE_LABEL=$package_label"
              echo "THERION_STUDIO_DEBIAN_VERSION=$debian_version"
            } >> "$GITHUB_ENV"
            echo "No CalVer release tag points at this commit; using development version $version, package label $package_label, and Debian version $debian_version."
          fi

      - name: Build .deb in Ubuntu 26.04 container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -e "BUILD_TYPE=$PACKAGE_BUILD_TYPE" \
            -e "DEB_QT_PACKAGES=$DEB_QT_PACKAGES" \
            -e "HOST_GID=$(id -g)" \
            -e "HOST_UID=$(id -u)" \
            -e "THERION_STUDIO_DEB_ARCHITECTURE_LABEL=${{ matrix.deb_qt_architecture }}" \
            -e "THERION_STUDIO_DEB_PLATFORM_LABEL=$DEB_PLATFORM_LABEL" \
            -e "THERION_STUDIO_DEBIAN_VERSION=$THERION_STUDIO_DEBIAN_VERSION" \
            -e "THERION_STUDIO_PACKAGE_LABEL=$THERION_STUDIO_PACKAGE_LABEL" \
            -e "THERION_STUDIO_VERSION=$THERION_STUDIO_VERSION" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DEB_BUILD_IMAGE" \
            bash scripts/linux-packages/build_deb_package.sh
          echo "DEB_QT_VERSION=$(cat build-linux-packages/deb-qt-version.txt)" >> "$GITHUB_ENV"

      - name: Build AppImage in Debian 13 container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -e "APPIMAGETOOL_SHA256=${{ matrix.appimagetool_sha256 }}" \
            -e "APPIMAGETOOL_URL=${{ matrix.appimagetool_url }}" \
            -e "APPIMAGE_QT_PACKAGES=$APPIMAGE_QT_PACKAGES" \
            -e "APPIMAGE_RUNTIME_SHA256=${{ matrix.appimage_runtime_sha256 }}" \
            -e "APPIMAGE_RUNTIME_URL=${{ matrix.appimage_runtime_url }}" \
            -e "BUILD_TYPE=$PACKAGE_BUILD_TYPE" \
            -e "HOST_GID=$(id -g)" \
            -e "HOST_UID=$(id -u)" \
            -e "THERION_STUDIO_APPIMAGE_ARCHITECTURE_LABEL=${{ matrix.appimage_architecture }}" \
            -e "THERION_STUDIO_DEBIAN_VERSION=$THERION_STUDIO_DEBIAN_VERSION" \
            -e "THERION_STUDIO_PACKAGE_LABEL=$THERION_STUDIO_PACKAGE_LABEL" \
            -e "THERION_STUDIO_VERSION=$THERION_STUDIO_VERSION" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$APPIMAGE_BUILD_IMAGE" \
            bash scripts/linux-packages/build_appimage_package.sh
          echo "APPIMAGE_QT_VERSION=$(cat build-linux-appimage/appimage-qt-version.txt)" >> "$GITHUB_ENV"

      - name: Verify Linux artifacts and generate manifest
        id: verify_linux_artifacts
        run: |
          python3 scripts/linux-packages/verify_release_artifacts.py \
            --build-dir "$PWD/build-linux-packages" \
            --appimage-dir "$PWD/build-linux-appimage" \
            --expected-package-label "${{ env.THERION_STUDIO_PACKAGE_LABEL }}" \
            --version "${{ env.THERION_STUDIO_VERSION }}" \
            --source-ref "$PACKAGE_SOURCE_REF" \
            --build-type "$PACKAGE_BUILD_TYPE" \
            --debian-version "${{ env.THERION_STUDIO_DEBIAN_VERSION }}" \
            --deb-platform-label "$DEB_PLATFORM_LABEL" \
            --deb-build-source "$DEB_BUILD_IMAGE apt" \
            --deb-qt-version "$DEB_QT_VERSION" \
            --deb-qt-architecture "${{ matrix.deb_qt_architecture }}" \
            --deb-qt-packages "$DEB_QT_PACKAGES" \
            --appimage-architecture "${{ matrix.appimage_architecture }}" \
            --appimagetool-url "${{ matrix.appimagetool_url }}" \
            --appimagetool-sha256 "${{ matrix.appimagetool_sha256 }}" \
            --appimage-runtime-url "${{ matrix.appimage_runtime_url }}" \
            --appimage-runtime-sha256 "${{ matrix.appimage_runtime_sha256 }}" \
            --appimage-qt-source "$APPIMAGE_BUILD_IMAGE apt" \
            --appimage-qt-version "$APPIMAGE_QT_VERSION" \
            --appimage-qt-architecture "${{ matrix.deb_qt_architecture }}" \
            --appimage-qt-packages "$APPIMAGE_QT_PACKAGES" \
            --runner-label "${{ matrix.runner_label }}" \
            --manifest-out "$PWD/build-linux-packages/TherionStudio-Linux-${{ matrix.appimage_architecture }}-artifacts-manifest.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TherionStudio-Linux-packages-${{ matrix.appimage_architecture }}
          path: |
            ${{ steps.verify_linux_artifacts.outputs.deb_path }}
            ${{ steps.verify_linux_artifacts.outputs.appimage_path }}
            ${{ steps.verify_linux_artifacts.outputs.manifest_path }}
          if-no-files-found: error

  smoke-linux-targets:
    name: Smoke test Linux artifacts on ${{ matrix.target_name }} (${{ matrix.appimage_architecture }})
    needs: package
    runs-on: ${{ matrix.runner_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Ubuntu 26.04
            appimage_architecture: x86_64
            container_image: ubuntu:26.04
            deb_qt_architecture: amd64
            deb_smoke: true
            runner_label: ubuntu-24.04
          - target_name: Debian 13
            appimage_architecture: x86_64
            container_image: debian:13
            deb_qt_architecture: amd64
            deb_smoke: false
            runner_label: ubuntu-24.04
          - target_name: Ubuntu 26.04
            appimage_architecture: aarch64
            container_image: ubuntu:26.04
            deb_qt_architecture: arm64
            deb_smoke: true
            runner_label: ubuntu-24.04-arm
          - target_name: Debian 13
            appimage_architecture: aarch64
            container_image: debian:13
            deb_qt_architecture: arm64
            deb_smoke: false
            runner_label: ubuntu-24.04-arm
    container:
      image: ${{ matrix.container_image }}

    steps:
      - name: Install checkout dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            git

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref_name }}
          fetch-depth: 1

      - name: Download Linux package artifacts
        uses: actions/download-artifact@v6
        with:
          name: TherionStudio-Linux-packages-${{ matrix.appimage_architecture }}
          path: /tmp/therion-linux-packages

      - name: Smoke test .deb package (offscreen)
        if: ${{ matrix.deb_smoke }}
        shell: bash
        run: |
          THERION_STUDIO_ARTIFACT_DIR=/tmp/therion-linux-packages \
          THERION_STUDIO_DEB_ARCHITECTURE_LABEL=${{ matrix.deb_qt_architecture }} \
            bash scripts/linux-packages/smoke_deb_package.sh

      - name: Launch AppImage smoke test (offscreen)
        shell: bash
        run: |
          THERION_STUDIO_APPIMAGE_ARCHITECTURE_LABEL=${{ matrix.appimage_architecture }} \
          THERION_STUDIO_ARTIFACT_DIR=/tmp/therion-linux-packages \
            bash scripts/linux-packages/smoke_appimage_package.sh
