name: Windows Installer

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to package
        required: true
        default: main
      qt_version:
        description: Qt version to install
        required: true
        default: 6.7.3
      build_type:
        description: CMake build type
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo

jobs:
  package:
    name: Build NSIS installer
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Describe packaged source
        shell: pwsh
        run: |
          git rev-parse --short HEAD
          git describe --tags --always --dirty

      - name: Resolve package version
        shell: pwsh
        run: |
          $tagCandidates = @(git tag --points-at HEAD)
          $releaseTag = $tagCandidates | Where-Object { $_ -match '^v?(\d{4})\.(\d{1,2})\.(\d+)$' } | Select-Object -First 1
          if ($releaseTag) {
            $null = $releaseTag -match '^v?(\d{4})\.(\d{1,2})\.(\d+)$'
            $version = "$($Matches[1]).$([int]$Matches[2]).$([int]$Matches[3])"
            $packageLabel = $version
            "THERION_STUDIO_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
            "THERION_STUDIO_PACKAGE_LABEL=$packageLabel" | Out-File -FilePath $env:GITHUB_ENV -Append
            "Resolved Therion Studio release version $version from tag $releaseTag"
          } else {
            $now = (Get-Date).ToUniversalTime()
            $year = $now.ToString("yyyy")
            $month = [int]$now.ToString("MM")
            $shortSha = git rev-parse --short HEAD
            $version = "$year.$month.0"
            $packageLabel = "$version-$shortSha"
            "THERION_STUDIO_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
            "THERION_STUDIO_PACKAGE_LABEL=$packageLabel" | Out-File -FilePath $env:GITHUB_ENV -Append
            "No CalVer release tag points at this commit; using development version $version with package label $packageLabel."
          }

      - name: Install packaging tools
        shell: pwsh
        run: choco install ninja nsis --no-progress -y

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          arch: win64_msvc2022_64
          modules: qtsvg qttools
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          $configureArgs = @(
            "-S", ".",
            "-B", "build-windows",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=${{ inputs.build_type }}",
            "-DTHERION_ENABLE_STRICT_WARNINGS=ON"
          )
          if ($env:THERION_STUDIO_VERSION) {
            $configureArgs += "-DTHERION_STUDIO_VERSION=$env:THERION_STUDIO_VERSION"
          }
          if ($env:THERION_STUDIO_PACKAGE_LABEL) {
            $configureArgs += "-DTHERION_STUDIO_PACKAGE_LABEL=$env:THERION_STUDIO_PACKAGE_LABEL"
          }
          cmake @configureArgs

      - name: Build
        shell: pwsh
        run: cmake --build build-windows --target TherionStudio --parallel

      - name: Create installer
        shell: pwsh
        run: cpack --config build-windows/CPackConfig.cmake -C ${{ inputs.build_type }} --verbose

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TherionStudio-Windows-installer
          path: build-windows/TherionStudio-*-Windows-x86_64.exe
          if-no-files-found: error
