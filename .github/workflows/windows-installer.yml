name: Windows Installer

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to package
        required: true
        default: main
      qt_version:
        description: Qt version to install
        required: true
        default: 6.8.3
      build_type:
        description: CMake build type
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo

jobs:
  package:
    name: Build NSIS installer
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Set up MSVC toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vsWhere)) {
            throw "vswhere.exe not found at $vsWhere"
          }

          $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstallPath) {
            throw "No Visual Studio installation with MSVC tools found."
          }
          $vsInstallPath = $vsInstallPath.Trim()

          $vsDevCmd = Join-Path $vsInstallPath "Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat not found at $vsDevCmd"
          }

          $configuredEnv = & cmd.exe /s /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set"
          if ($LASTEXITCODE -ne 0) {
            throw "VsDevCmd.bat failed with exit code $LASTEXITCODE"
          }

          foreach ($line in $configuredEnv) {
            if ($line -match '^([^=]+)=(.*)$') {
              $name = $Matches[1]
              $value = $Matches[2]
              if ($name -match '^(GITHUB_|RUNNER_)') {
                continue
              }
              "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Describe packaged source
        shell: pwsh
        run: |
          git rev-parse --short HEAD
          git describe --tags --always --dirty

      - name: Resolve package version
        shell: pwsh
        run: |
          $tagCandidates = @(git tag --points-at HEAD)
          $releaseTag = $tagCandidates | Where-Object { $_ -match '^v?(\d{4})\.(\d{1,2})\.(\d+)$' } | Select-Object -First 1
          if ($releaseTag) {
            $null = $releaseTag -match '^v?(\d{4})\.(\d{1,2})\.(\d+)$'
            $version = "$($Matches[1]).$([int]$Matches[2]).$([int]$Matches[3])"
            $packageLabel = $version
            "THERION_STUDIO_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
            "THERION_STUDIO_PACKAGE_LABEL=$packageLabel" | Out-File -FilePath $env:GITHUB_ENV -Append
            "Resolved Therion Studio release version $version from tag $releaseTag"
          } else {
            $now = (Get-Date).ToUniversalTime()
            $year = $now.ToString("yyyy")
            $month = [int]$now.ToString("MM")
            $shortSha = git rev-parse --short HEAD
            $version = "$year.$month.0"
            $packageLabel = "$version-$shortSha"
            "THERION_STUDIO_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
            "THERION_STUDIO_PACKAGE_LABEL=$packageLabel" | Out-File -FilePath $env:GITHUB_ENV -Append
            "No CalVer release tag points at this commit; using development version $version with package label $packageLabel."
          }

      - name: Install packaging tools
        shell: pwsh
        run: choco install ninja nsis --no-progress -y

      - name: Install Qt
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -Scope Global -ErrorAction SilentlyContinue) {
            $global:PSNativeCommandUseErrorActionPreference = $true
          }
          function Invoke-CheckedNativeCommand {
            $command = $args[0]
            $commandArgs = @($args | Select-Object -Skip 1)
            & $command @commandArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Command failed with exit code ${LASTEXITCODE}: $($args -join ' ')"
            }
          }

          Invoke-CheckedNativeCommand python -m pip install --upgrade aqtinstall
          Invoke-CheckedNativeCommand python -m aqt install-qt windows desktop ${{ inputs.qt_version }} win64_msvc2022_64 `
            --base https://download.qt.io `
            --timeout 30 `
            --outputdir "$env:RUNNER_WORKSPACE\Qt" `
            --archives qtbase qtsvg qttools
          $qtRoot = Get-ChildItem -Path "$env:RUNNER_WORKSPACE\Qt\${{ inputs.qt_version }}" -Directory |
            Where-Object { $_.Name -like "*msvc2022_64" } |
            Select-Object -First 1
          if (-not $qtRoot) {
            throw "Qt installation root not found."
          }
          "CMAKE_PREFIX_PATH=$($qtRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($qtRoot.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Configure
        shell: pwsh
        run: |
          $configureArgs = @(
            "-S", ".",
            "-B", "build-windows",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=${{ inputs.build_type }}",
            "-DCMAKE_C_COMPILER=cl",
            "-DCMAKE_CXX_COMPILER=cl",
            "-DTHERION_ENABLE_STRICT_WARNINGS=ON"
          )
          if ($env:THERION_STUDIO_VERSION) {
            $configureArgs += "-DTHERION_STUDIO_VERSION=$env:THERION_STUDIO_VERSION"
          }
          if ($env:THERION_STUDIO_PACKAGE_LABEL) {
            $configureArgs += "-DTHERION_STUDIO_PACKAGE_LABEL=$env:THERION_STUDIO_PACKAGE_LABEL"
          }
          cmake @configureArgs

      - name: Build
        shell: pwsh
        run: cmake --build build-windows --target TherionStudio --parallel

      - name: Install app to staging prefix
        shell: pwsh
        run: cmake --install build-windows --prefix "$env:GITHUB_WORKSPACE\build-windows\install-smoke" --config ${{ inputs.build_type }}

      - name: Verify install layout
        shell: pwsh
        run: python scripts/verify_install_layout.py --platform windows --prefix "$env:GITHUB_WORKSPACE\build-windows\install-smoke"

      - name: Create installer
        shell: pwsh
        run: >
          cpack
          --config build-windows/CPackConfig.cmake
          -B build-windows
          -C ${{ inputs.build_type }}
          --verbose

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TherionStudio-Windows-installer
          path: |
            build-windows/TherionStudio-*-Windows-x86_64.exe
            TherionStudio-*-Windows-x86_64.exe
          if-no-files-found: error
